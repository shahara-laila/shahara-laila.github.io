---
layout: default
---

<div class="page-header">
  <div class="container">
    {% if page.title %}
    <h1 class="page-header-title">{{ page.title }}</h1>
    {% endif %}
    {% if page.subtitle %}
    <p class="page-header-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</div>

<div class="section">
  <div class="container page-content">
    {{ content }}
  </div>
</div>
