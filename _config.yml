title: "Shahara Laila"
tagline: "Aspiring Faculty Member · Computer Science Researcher · Educator"
description: "Personal portfolio of Shahara Laila, Computer Science Researcher and M.Sc. student at MIST."
url: "https://shahara-laila.github.io"
baseurl: ""

author:
  name: "Shahara Laila"
  email: "shaharalaila123@gmail.com"
  github: "shahara-laila" # GitHub username
  scholar: "mKWUx9AAAAAJ" # Google Scholar user ID (from scholar.google.com URL)
  linkedin: "shahara-laila-tazin" # LinkedIn handle (linkedin.com/in/YOUR-HANDLE)
  orcid: "0009-0001-7595-0831" # ORCID iD e.g. 0000-0001-2345-6789
  twitter: "" # not displayed; leave empty
  researchgate: "Shahara-Laila" # ResearchGate profile name

profile:
  publications: "2"
  students: "400+"
  teaching_years: "1 yr"
  projects: "5+"
  lecturer_at: "Varendra University, Rajshahi"
  research_institution: "Jashore University of Science and Technology"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: null

# Collections
collections:
  publications:
    output: true
    permalink: /publications/:slug/
  projects:
    output: true
    permalink: /projects/:slug/
  certifications:
    output: true
    permalink: /certifications/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "certifications"
    values:
      layout: "certification"
  - scope:
      path: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Pagination
paginate: 6
paginate_path: "/blog/page:num/"

# Sass
sass:
  sass_dir: assets/css
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Feed
feed:
  path: feed.xml
